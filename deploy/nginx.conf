server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 64m;

  # Gzip 压缩配置
  gzip on;
  gzip_min_length 1024;
  gzip_buffers 4 16k;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_vary on;
  gzip_disable "MSIE [1-6]\.";

  # 1. 强缓存：带 Content Hash 的 Vite 静态资源（位于 assets 目录）
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
  }

  # 2. 协商缓存：其他静态资源与数据文件（图片、字体、PDF、JSON 等）
  location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|pdf|json)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, must-revalidate";
    access_log off;
    try_files $uri =404;
  }

  location = /healthz { access_log off; return 200 'ok'; add_header Content-Type text/plain; }
  location /api/ { proxy_pass http://api:8787; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_buffering off; proxy_read_timeout 180s; }
  location /health/ { proxy_pass http://api:8787; }
  location /metrics { proxy_pass http://api:8787; }

  # 3. HTML 页面：每次都请求服务器进行协商缓存
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
