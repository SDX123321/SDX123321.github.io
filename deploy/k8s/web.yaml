apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-review-web
  namespace: exam-review
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exam-review-web
  template:
    metadata:
      labels:
        app: exam-review-web
    spec:
      containers:
        - name: web
          image: ghcr.io/replace-me/exam-review-web:2.1.0
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: exam-review-web
  namespace: exam-review
spec:
  selector:
    app: exam-review-web
  ports:
    - name: http
      port: 80
      targetPort: http
