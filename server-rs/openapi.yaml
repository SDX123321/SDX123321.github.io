openapi: 3.1.0
info:
  title: Exam Review Knowledge API
  version: 2.1.0
  description: Rust API for shared learning domains, RAG, graph generation and administration.
servers:
  - url: /
security: []
paths:
  /health/live:
    get:
      tags: [Operations]
      summary: Process liveness
      responses:
        '200': { description: Process is alive }
  /health/ready:
    get:
      tags: [Operations]
      summary: Database and vector readiness
      responses:
        '200': { description: Service is ready }
        '500': { description: Dependency unavailable }
  /metrics:
    get:
      tags: [Operations]
      summary: Prometheus metrics
      responses:
        '200': { description: Prometheus text exposition }
  /api/domains:
    get:
      tags: [Knowledge]
      summary: List available content domains, subjects and courses
      responses:
        '200': { description: Domain hierarchy }
  /api/knowledge/search:
    post:
      tags: [Knowledge]
      summary: Search a domain knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domainId, query]
              properties:
                domainId: { type: string, format: uuid }
                subjectId: { type: [string, 'null'], format: uuid }
                query: { type: string, minLength: 2 }
                limit: { type: integer, minimum: 1, maximum: 30 }
      responses:
        '200': { description: Ranked matches }
  /api/knowledge/rag/answer:
    post:
      tags: [Knowledge]
      summary: Stream a source-grounded answer as NDJSON
      responses:
        '200': { description: NDJSON source and answer events }
        '401': { description: Authentication required }
  /api/knowledge/graphs/current:
    get:
      tags: [Knowledge Graph]
      summary: Get the published shared graph
      parameters:
        - { in: query, name: domainId, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: subjectId, schema: { type: string, format: uuid } }
      responses:
        '200': { description: "Graph, nodes, edges and personal state" }
        '404': { description: No published graph }
  /api/admin/knowledge/index-runs:
    post:
      tags: [Administration]
      summary: Start incremental, missing-only or rebuild indexing
      security: [{ cookieAuth: [] }]
      responses:
        '202': { description: Index job accepted }
        '403': { description: Administrator required }
  /api/admin/runtime-config/ollama:
    get:
      tags: [Administration]
      summary: Read whitelisted Ollama runtime configuration
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Runtime configuration and connectivity }
    put:
      tags: [Administration]
      summary: Validate, persist and hot-activate Ollama configuration
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Configuration activated }
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: exam_review_session
