<title>马克思主义基本原理 - 互动复习</title>
<style>
:root {
  --bg: #f5f7fa; --bg2: #fff; --bg3: #eef1f5; --text: #1a1a2e; --text2: #4a4a6a;
  --accent: #4361ee; --accent2: #3a0ca3; --accent-bg: #eef0ff; --accent-bg2: #dde2ff;
  --success: #2ec4b6; --success-bg: #e8faf8; --warn: #ff6b35; --warn-bg: #fff3ed;
  --danger: #e63946; --danger-bg: #fde8ea; --card-shadow: 0 2px 12px rgba(0,0,0,.08);
  --radius: 12px; --transition: .25s ease;
}
.dark {
  --bg: #0f0e17; --bg2: #1a1a2e; --bg3: #16213e; --text: #e8e8ef; --text2: #a0a0c0;
  --accent: #7b8cff; --accent2: #a78bfa; --accent-bg: #1e1e3f; --accent-bg2: #2a2a4f;
  --success-bg: #0d2d2a; --warn-bg: #2d1a0d; --danger-bg: #2d0d11;
  --card-shadow: 0 2px 12px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: background var(--transition), color var(--transition); }
a { color: var(--accent); text-decoration: none; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text2); border-radius: 3px; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 280px; min-width: 280px; background: var(--bg2); border-right: 1px solid var(--bg3); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; transition: transform var(--transition), background var(--transition); overflow-y: auto; }
.sidebar.collapsed { transform: translateX(-100%); }
.main { flex: 1; margin-left: 280px; padding: 0; transition: margin var(--transition); }
.main.full { margin-left: 0; }

/* Sidebar */
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--bg3); }
.sidebar-header h1 { font-size: 16px; font-weight: 700; color: var(--accent); }
.sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
.nav-group { padding: 8px 12px; }
.nav-group-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all var(--transition); position: relative; }
.nav-item:hover { background: var(--accent-bg); color: var(--accent); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
.nav-item .badge { margin-left: auto; background: var(--bg3); color: var(--text2); font-size: 11px; padding: 1px 6px; border-radius: 10px; }
.nav-item.active .badge { background: var(--accent); color: #fff; }
.nav-item .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg3); flex-shrink: 0; }
.nav-item .progress-dot.done { background: var(--success); }

/* Top Bar */
.topbar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; background: var(--bg2); border-bottom: 1px solid var(--bg3); position: sticky; top: 0; z-index: 50; }
.topbar .menu-btn { display: none; background: none; border: none; color: var(--text); cursor: pointer; font-size: 20px; padding: 4px 8px; border-radius: 6px; }
.topbar .menu-btn:hover { background: var(--bg3); }
.search-box { flex: 1; max-width: 500px; position: relative; }
.search-box input { width: 100%; padding: 8px 12px 8px 36px; border: 1.5px solid var(--bg3); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; transition: border var(--transition); }
.search-box input:focus { border-color: var(--accent); }
.search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 14px; }
.topbar-actions { display: flex; gap: 8px; margin-left: auto; }
.icon-btn { background: none; border: 1.5px solid var(--bg3); color: var(--text2); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all var(--transition); }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.icon-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Mode Tabs */
.mode-tabs { display: flex; gap: 4px; padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--bg3); }
.mode-tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all var(--transition); border: none; background: none; }
.mode-tab:hover { background: var(--accent-bg); color: var(--accent); }
.mode-tab.active { background: var(--accent); color: #fff; }

/* Content Area */
.content { max-width: 860px; margin: 0 auto; padding: 24px; }
.chapter-title { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.chapter-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 24px; }

/* Stats Bar */
.stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: var(--bg2); border-radius: var(--radius); padding: 16px 20px; flex: 1; min-width: 140px; box-shadow: var(--card-shadow); }
.stat-card .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-card .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
.stat-card.success .stat-num { color: var(--success); }
.stat-card.warn .stat-num { color: var(--warn); }

/* Section */
.section { margin-bottom: 28px; }
.section-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--accent-bg); border-radius: var(--radius); cursor: pointer; margin-bottom: 12px; transition: background var(--transition); }
.section-header:hover { background: var(--accent-bg2); }
.section-header h3 { font-size: 15px; font-weight: 600; color: var(--accent); flex: 1; }
.section-header .count { font-size: 12px; color: var(--text2); background: var(--bg2); padding: 2px 8px; border-radius: 10px; }
.section-header .arrow { color: var(--text2); transition: transform var(--transition); font-size: 12px; }
.section-header.open .arrow { transform: rotate(90deg); }

/* QA Card */
.qa-list { display: flex; flex-direction: column; gap: 10px; }
.qa-card { background: var(--bg2); border-radius: var(--radius); box-shadow: var(--card-shadow); overflow: hidden; transition: all var(--transition); border-left: 3px solid transparent; }
.qa-card:hover { border-left-color: var(--accent); }
.qa-card.known { border-left-color: var(--success); }
.qa-card.unknown { border-left-color: var(--warn); }
.qa-question { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; }
.qa-question .q-icon { background: var(--accent); color: #fff; width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.qa-question .q-text { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
.qa-question .toggle-icon { color: var(--text2); transition: transform var(--transition); flex-shrink: 0; margin-top: 3px; }
.qa-card.open .toggle-icon { transform: rotate(180deg); }
.qa-answer { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
.qa-card.open .qa-answer { max-height: 2000px; }
.qa-answer-inner { padding: 0 16px 16px 48px; font-size: 14px; color: var(--text2); line-height: 1.85; }
.qa-answer-inner strong { color: var(--text); font-weight: 600; }
.qa-actions { display: flex; gap: 8px; padding: 0 16px 12px 48px; }
.qa-actions button { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--bg3); background: var(--bg); color: var(--text2); transition: all var(--transition); }
.qa-actions button:hover { border-color: var(--accent); color: var(--accent); }
.qa-actions button.known-btn.active { background: var(--success-bg); border-color: var(--success); color: var(--success); }
.qa-actions button.unknown-btn.active { background: var(--warn-bg); border-color: var(--warn); color: var(--warn); }

/* Flashcard Mode */
.flashcard-container { max-width: 640px; margin: 0 auto; }
.flashcard-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.flashcard-progress .bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.flashcard-progress .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s ease; }
.flashcard-progress .count { font-size: 13px; color: var(--text2); white-space: nowrap; }
.flashcard { background: var(--bg2); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); min-height: 320px; cursor: pointer; perspective: 1000px; position: relative; }
.flashcard-inner { position: relative; width: 100%; min-height: 320px; transition: transform .5s ease; transform-style: preserve-3d; }
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back { position: absolute; top: 0; left: 0; right: 0; min-height: 320px; backface-visibility: hidden; display: flex; flex-direction: column; padding: 32px; border-radius: 16px; }
.flashcard-front { align-items: center; justify-content: center; background: var(--bg2); }
.flashcard-back { transform: rotateY(180deg); background: var(--accent-bg); overflow-y: auto; }
.flashcard-label { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
.flashcard-text { font-size: 18px; font-weight: 600; text-align: center; line-height: 1.6; color: var(--text); }
.flashcard-back .flashcard-text { font-size: 15px; font-weight: 400; text-align: left; color: var(--text2); line-height: 1.85; }
.flashcard-hint { margin-top: 20px; font-size: 12px; color: var(--text2); }
.flashcard-nav { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
.flashcard-nav button { padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: 2px solid var(--bg3); background: var(--bg2); color: var(--text2); transition: all var(--transition); }
.flashcard-nav button:hover { border-color: var(--accent); color: var(--accent); }
.flashcard-nav button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.flashcard-nav button.primary:hover { background: var(--accent2); }
.flashcard-nav button.success-btn { background: var(--success); color: #fff; border-color: var(--success); }
.flashcard-nav button.warn-btn { background: var(--warn); color: #fff; border-color: var(--warn); }
.flashcard-filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.flashcard-filter button { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1.5px solid var(--bg3); background: var(--bg2); color: var(--text2); transition: all var(--transition); }
.flashcard-filter button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Quiz Mode */
.quiz-container { max-width: 640px; margin: 0 auto; }
.quiz-setup { background: var(--bg2); border-radius: var(--radius); padding: 24px; box-shadow: var(--card-shadow); margin-bottom: 20px; }
.quiz-setup h3 { font-size: 18px; margin-bottom: 16px; }
.quiz-option { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
.quiz-option input[type="radio"] { accent-color: var(--accent); }
.quiz-option label { font-size: 14px; cursor: pointer; }
.quiz-question-card { background: var(--bg2); border-radius: var(--radius); padding: 24px; box-shadow: var(--card-shadow); margin-bottom: 16px; }
.quiz-question-card h4 { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
.quiz-question-card .q { font-size: 16px; font-weight: 600; margin-bottom: 16px; line-height: 1.6; }
.quiz-choices { display: flex; flex-direction: column; gap: 8px; }
.quiz-choice { padding: 12px 16px; border: 2px solid var(--bg3); border-radius: 10px; cursor: pointer; font-size: 14px; transition: all var(--transition); }
.quiz-choice:hover { border-color: var(--accent); background: var(--accent-bg); }
.quiz-choice.selected { border-color: var(--accent); background: var(--accent-bg); }
.quiz-choice.correct { border-color: var(--success); background: var(--success-bg); }
.quiz-choice.wrong { border-color: var(--danger); background: var(--danger-bg); }
.quiz-choice.disabled { pointer-events: none; }
.quiz-result { text-align: center; padding: 32px; background: var(--bg2); border-radius: var(--radius); box-shadow: var(--card-shadow); }
.quiz-result .score { font-size: 48px; font-weight: 800; color: var(--accent); }
.quiz-result .score-label { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
.btn { padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all var(--transition); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--bg3); color: var(--text); }
.btn-secondary:hover { background: var(--accent-bg); }

/* Welcome */
.welcome { text-align: center; padding: 60px 20px; }
.welcome h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
.welcome p { color: var(--text2); max-width: 500px; margin: 0 auto 32px; }
.welcome-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; max-width: 640px; margin: 0 auto; }
.welcome-card { background: var(--bg2); border-radius: var(--radius); padding: 20px; box-shadow: var(--card-shadow); cursor: pointer; transition: all var(--transition); }
.welcome-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.12); }
.welcome-card .wc-icon { font-size: 28px; margin-bottom: 8px; }
.welcome-card h3 { font-size: 15px; margin-bottom: 4px; }
.welcome-card p { font-size: 12px; color: var(--text2); margin: 0; }

/* Search Results */
.search-results { margin-top: 20px; }
.search-results .result-item { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--card-shadow); cursor: pointer; transition: all var(--transition); }
.search-results .result-item:hover { border-left: 3px solid var(--accent); }
.search-results .result-chapter { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.search-results .result-q { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.search-results .result-a { font-size: 13px; color: var(--text2); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
mark { background: var(--warn-bg); color: var(--warn); padding: 0 2px; border-radius: 2px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform .3s ease; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.3); }
  .main { margin-left: 0 !important; }
  .topbar .menu-btn { display: block; }
  .content { padding: 16px; }
  .chapter-title { font-size: 20px; }
  .flashcard-text { font-size: 15px; }
  .stats-bar { gap: 8px; flex-wrap: wrap; }
  .stat-card { min-width: 80px; padding: 10px; }
  .stat-card .stat-num { font-size: 20px; }
  .card { padding: 14px 16px; margin: 8px 0; }
  table { font-size: .82em; }
  th, td { padding: 5px 6px; }
  .welcome-cards { grid-template-columns: 1fr 1fr; }
  .quiz-container { padding: 14px 16px; }
  h1 { font-size: 1.5em; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .content { padding: 20px 24px; }
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn .3s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

/* Overlay for mobile */
.overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 90; }
.overlay.show { display: block; }

/* Keyboard shortcut hints */
.kbd { display: inline-block; padding: 2px 6px; font-size: 11px; font-family: monospace; background: var(--bg3); border-radius: 4px; color: var(--text2); margin: 0 2px; }
.sg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1003;justify-content:center;align-items:center}
.sg-box{background:var(--card,#1e293b);border-radius:16px;padding:28px 32px;max-width:400px;width:90vw;border:1px solid var(--border,#334155);box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
.sg-box h3{font-size:1.1rem;margin-bottom:8px;color:var(--text,#e2e8f0)}
.sg-box p{font-size:.85rem;color:var(--text2,#94a3b8);margin-bottom:6px;line-height:1.7}
.sg-box button{margin-top:16px;padding:8px 24px;border-radius:8px;border:none;background:var(--accent,#60a5fa);color:#fff;font-size:.88rem;font-weight:600;cursor:pointer}
</style>

{q:"马克思主义的科学内涵是什么？",a:"马克思主义是由马克思、恩格斯创立并为后继者所不断发展的科学理论体系，是关于自然、社会和人类思维发展一般规律的学说，是关于社会主义必然代替资本主义、最终实现共产主义的学说，是关于无产阶级解放、全人类解放和每个人自由而全面发展的学说，是无产阶级政党和社会主义国家的指导思想，是指引人民创造美好生活的行动指南。"},

{q:"马克思主义的基本立场、基本观点和基本方法分别有什么意义？",a:"①基本立场：是马克思主义观察、分析和解决问题的根本立足点和出发点；②基本观点：是关于自然、社会和人类思维发展一般规律的科学认识，是对资本主义社会和社会主义社会发展规律的科学认识，是对人类思想成果和社会实践经验的科学总结；③基本方法：是建立在辩证唯物主义和历史唯物主义世界观和方法论基础上，指导我们正确认识世界和改造世界的思想方法和工作方法。"}
]},
{title:"马克思主义的创立与发展",qa:[
{q:"马克思主义是如何产生的？",a:"马克思主义产生于19世纪40年代，创始人是马克思和恩格斯。具有深刻的社会根源、阶级基础和思想渊源。<br><strong>社会根源：</strong>工业革命和科技进步促进了生产力发展，资本主义生产方式带来社会灾难；<br><strong>阶级基础：</strong>无产阶级在反抗剥削和压迫的斗争中走向自觉，渴望科学理论指导；<br><strong>思想渊源：</strong>德国古典哲学、英国古典政治经济学、英法空想社会主义。<br>附：1848年《共产党宣言》发表"},
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>马克思主义中国化的理论成果主要有哪些？",a:"\"马列毛邓三科习\"——马克思列宁主义、毛泽东思想、邓小平理论、\"三个代表\"重要思想、科学发展观、习近平新时代中国特色社会主义思想。"}
]},
{title:"马克思主义的基本特征",qa:[
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>马克思主义的基本特征是什么？",a:"马克思主义具有鲜明的<strong>科学性、人民性、实践性、发展性</strong>。<br>科学的理论：对自然、社会和人类思维发展本质和规律的正确反映；<br>人民的理论：人民性是马克思主义的本质属性，人民至上是其政治立场；<br>实践的理论：从实践中来、到实践中去、在实践中接受检验并不断发展；<br>发展的理论：不断发展的开放学说，具有与时俱进的理论品质。<br>一句话概括：<strong>科学性与革命性的统一</strong>。"}
]},
{title:"马克思主义的当代价值",qa:[
{q:"马克思主义的当代价值有哪些？",a:"①马克思主义是<strong>观察当代世界变化的认识工具</strong>，给予宏大视野、锐利目光和战略定力；<br>②马克思主义是<strong>指引当代中国发展的行动指南</strong>，是精神旗帜、精神动力和行动指南；<br>③马克思主义是<strong>引领人类社会进步的科学真理</strong>，世界仍处于从资本主义走向社会主义的大时代。"}
]},
{title:"自觉学习和运用马克思主义",qa:[
{q:"大学生应当如何学习马克思主义理论？",a:"①努力学习和掌握马克思主义的基本立场观点方法；<br>②努力学习和掌握马克思主义中国化时代化的理论成果；<br>③坚持理论联系实际的马克思主义学风；<br>④自觉将马克思主义内化于心、外化于行。"}
]}
]},

{id:"ch1",title:"Ⅰ 世界的物质性及发展规律",icon:"🌍",sections:[
{title:"物质及其存在方式",qa:[
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>什么是哲学？哲学的基本问题包含哪些内容？",a:"哲学是系统化、理论化的世界观，是对自然知识、社会知识和思维知识的概括和总结。<br>基本问题包括两方面：①存在和思维、物质和意识谁为本原的问题（<strong>唯物主义VS唯心主义</strong>）；②存在和思维是否具有同一性的问题（<strong>可知论VS不可知论</strong>）。"},
{q:"什么是物质？马克思主义的物质范畴具有怎样的理论意义？",a:"物质是标志客观实在的哲学范畴，这种客观实在是人通过感觉感知的，它不依赖于我们的感觉而存在，为我们的感觉所复写、摄影、反映。<br><strong>理论意义：</strong>①坚持了唯物主义一元论；②坚持了能动的反映论和可知论；③体现了唯物论和辩证法的统一；④体现了唯物主义自然观与历史观的统一。"},
{q:"什么是物质的根本属性和基本存在形式？",a:"物质的根本属性是<strong>运动</strong>。时间和空间是运动着的物质的基本存在形式。<br><strong>时间</strong>：物质运动的持续性、顺序性，特点是一维性；<br><strong>空间</strong>：物质运动的广延性、伸张性，具有长、宽、高三方面的规定性。"},
{q:"什么是客观世界和主观世界？",a:"<strong>客观世界</strong>是不依赖于人的思想意识而存在的现实世界，包括自然界和人类社会。<br><strong>主观世界</strong>是指人的意识、观念世界，是人的头脑反映和把握物质世界的精神活动的总和。"}
]},
{title:"物质与意识的辩证关系",qa:[
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>什么是意识？为什么说\"物质决定意识\"？",a:"意识是人脑的机能和属性，是客观世界的主观映象，内容上是客观的，形式上是主观的。<br>意识是自然界长期发展的产物（反应特性→刺激感应性→感觉和心理→人类意识）；<br>意识也是社会历史发展的产物，社会实践特别是劳动起决定性作用。"},
{q:"如何理解意识的能动作用？",a:"意识的能动作用主要表现在：<br>①<strong>目的性和计划性</strong>：根据目的和要求确定反映什么及怎样反映；<br>②<strong>创造性</strong>：运用概念、判断、推理对感性材料加工，构造观念世界；<br>③<strong>指导实践改造客观世界</strong>：以观念为指导，通过实践变为客观现实；<br>④<strong>调控行为和生理活动</strong>：意识、心理因素对行为选择和健康状况有重要影响。"},
{q:"主观能动性和客观规律性的辩证统一关系是什么？",a:"一方面，尊重客观规律是正确发挥主观能动性的前提；另一方面，只有充分发挥主观能动性，才能正确认识和利用客观规律。<br>前提：从实际出发；根本途径：实践；物质条件和手段。"},
{q:"为什么说人工智能不可能取代或超越人类智能？",a:"①人类意识是知情意统一体，AI只模拟理性智能，不具备情感、信念、意志；<br>②社会性是人的意识的本质属性，AI不可能真正具备人类的社会属性；<br>③人类自然语言是思维的物质外壳，AI难以完全理解自然语言真实意义；<br>④AI能获得可化约为数字信号的内容，但人脑中总有许多不可化约的东西。"}
]},
{title:"世界的物质统一性",qa:[
{q:"什么是世界的物质统一性？其理论意义与实践意义？",a:"①自然界是物质的；②人类社会本质上是生产实践基础上形成的物质体系；③人的意识统一于物质。<br><strong>理论意义：</strong>是辩证唯物主义最核心的观点，有助于树立唯物主义科学世界观；<br><strong>实践意义：</strong>有助于确立正确的思想路线，遵循一切从实际出发、实事求是的原则。"}
]},
{title:"联系和发展的普遍性",qa:[
{q:"联系和发展的观点具有怎样的意义？",a:"联系和发展的观点是唯物辩证法的总观点，集中体现了唯物辩证法的总特征。"},
{q:"什么是联系？联系具有哪些特点？",a:"联系是指事物内部各要素之间和事物之间相互影响、相互制约、相互作用的关系。<br>①<strong>客观性</strong>：事物本身固有的、不以人的意志为转移的；<br>②<strong>普遍性</strong>：任何事物内部相互联系、不能孤立存在、整个世界是统一整体；<br>③<strong>多样性</strong>：事物是多样的，联系也是多样的；<br>④<strong>条件性</strong>：联系是有条件的。"},
{q:"什么是发展的实质？新事物为什么不可战胜？",a:"发展的实质是<strong>新事物的产生和旧事物的灭亡</strong>。<br>新事物不可战胜的原因：①新事物适应已变化的环境和条件；②新事物在旧事物\"母体\"中孕育，既否定消极腐朽的东西，又保留合理因素并添加新内容。"}
]},
{title:"对立统一规律",qa:[
{q:"什么是唯物辩证法的实质与核心？",a:"<strong>对立统一规律</strong>是唯物辩证法的实质与核心。<strong>矛盾分析方法</strong>是人们认识世界和改造世界的根本方法。"},
{q:"什么是矛盾的同一性和斗争性？",a:"<strong>同一性：</strong>矛盾着的对立面相互依存、相互贯通——互为存在前提共处统一体中，在一定条件下可相互转化。<br><strong>斗争性：</strong>矛盾着的对立面相互排斥、相互分离。<br>同一性的作用：是事物存在和发展的前提；使矛盾双方相互吸取有利因素；规定事物转化的可能和发展趋势。<br>斗争性的作用：促进矛盾双方力量变化，为质变创造条件；是矛盾统一体过渡的决定性力量。"},
{q:"什么是矛盾的普遍性和特殊性？",a:"<strong>普遍性：</strong>矛盾存在于一切事物中，存在于一切事物发展过程的始终。<br><strong>特殊性：</strong>各个具体事物的矛盾、每一个矛盾的各个方面在发展不同阶段上各有特点，决定事物的不同性质。<br><strong>主要矛盾</strong>：处于支配地位、起决定作用的矛盾。<br><strong>矛盾的主要方面</strong>：处于支配地位、起主导作用的一方。事物的性质由主要矛盾的主要方面决定。"},
{q:"什么是\"两点论\"和\"重点论\"？",a:"<strong>两点论：</strong>分析事物时既看到对立又看到统一；既看到主要矛盾和矛盾的主要方面，又看到次要矛盾和次要方面。<br><strong>重点论：</strong>着重把握主要矛盾、矛盾的主要方面，以此作为解决问题的出发点。"},
{q:"什么是和谐？",a:"和谐是矛盾的一种特殊表现形式，体现着矛盾双方的相互依存、相互促进、共同发展。"}
]},
{title:"量变质变规律和否定之否定规律",qa:[
{q:"什么是质、量、度？什么是量变与质变？",a:"<strong>质：</strong>一事物区别于其他事物的内在规定性。<strong>量：</strong>事物的规模、程度、速度等数量规定性。<strong>度：</strong>保持事物质的稳定性的数量界限。<br><strong>量变：</strong>数量增减和排列次序变动，保持质的相对稳定性的不显著变化。<strong>质变：</strong>事物性质的根本变化，由一种质态向另一种质态的飞跃。"},
{q:"量变与质变的辩证关系是什么？",a:"①量变是质变的<strong>必要准备</strong>；②质变是量变的<strong>必然结果</strong>，并为新的量变开辟道路；③量变和质变<strong>相互渗透</strong>——总的量变过程中有部分质变，质变过程中有量的扩张。量变质变规律体现了事物发展的<strong>渐进性和飞跃性的统一</strong>。"},
{q:"什么是否定的深刻内涵？",a:"①否定是事物的<strong>自我否定</strong>、自我发展；②否定是事物发展的<strong>环节</strong>；③否定是新旧事物联系的<strong>环节</strong>；④辩证否定的实质是<strong>「扬弃」</strong>——既批判又继承，既克服消极因素又保留积极因素。"}
]},
{title:"联系与发展的基本环节",qa:[
{q:"内容与形式的关系？",a:"内容对形式具有决定作用；形式对内容具有反作用——适合的形式起积极推动作用，不适合的形式起消极阻碍作用。形式具有相对独立性，同一内容可通过多种形式体现。"},
{q:"本质与现象的关系？",a:"本质是一般的、相对稳定的、深藏于内部的；现象是个别的、多变易逝的、表面外显的。二者相互依存——本质决定现象，现象表现本质。不表现为现象的本质和不表现本质的现象都不存在。"},
{q:"原因与结果的关系？",a:"原因在前，结果在后，二者不能混淆。二者相互依存和相互转化——没有\"无果之因\"，也没有\"无因之果\"。一种现象在一种联系中是原因，在另一种联系中可能是结果。"},
{q:"必然与偶然的关系？",a:"没有脱离偶然的必然——必然总是伴随偶然，通过偶然表现出来；没有脱离必然的偶然——在偶然起支配作用的地方，实际上是必然起决定性作用。二者相互转化。"},
{q:"现实与可能的关系？",a:"现实是当下的客观存在；可能是事物潜在的趋势。二者相互转化——现实蕴藏未来的发展方向，可能包含发展为现实的因素和条件。"}
]},
{title:"唯物辩证法是认识世界和改造世界的根本方法",qa:[
{q:"什么是客观辩证法和主观辩证法？",a:"<strong>客观辩证法：</strong>客观事物以相互作用、相互联系的形式呈现出的各种物质形态的辩证运动和发展规律。<br><strong>主观辩证法：</strong>人类认识和思维运动的辩证法，即以概念作为思维细胞的辩证思维运动和发展规律。"},
{q:"四种辩证的逻辑思维方法是什么？",a:"①<strong>归纳与演绎</strong>：从个别到一般，又从一般到个别的推理形式；<br>②<strong>分析与综合</strong>：分析是把认识对象分解为各部分分别研究，综合是把各因素组合成整体；<br>③<strong>抽象与具体</strong>：从具体到抽象再到具体，达到真理性认识；<br>④<strong>逻辑与历史</strong>：逻辑的东西和历史的东西辩证统一。"},
{q:"五种思维能力是什么？",a:"①<strong>历史思维能力</strong>：以史为鉴、知古鉴今的能力；<br>②<strong>系统思维能力</strong>：全面系统分析和处理问题的能力；<br>③<strong>战略思维能力</strong>：高瞻远瞩、统揽全局的能力；<br>④<strong>底线思维能力</strong>：划清并坚守底线，避免最坏结果的思维；<br>⑤<strong>创新思维能力</strong>：破除迷信、超越陈规、开拓创新的能力。"}
]}
]},

{id:"ch2",title:"Ⅱ 实践与认识及其发展规律",icon:"🔬",sections:[
{title:"科学的实践观及其意义",qa:[
{q:"什么是马克思主义理论区别于其他理论的根本特征？",a:"<strong>实践性</strong>。<strong>实践的观点</strong>是马克思主义的基本观点。"},
{q:"科学实践观的意义是什么？",a:"①克服了旧唯物主义的根本缺陷，为辩证唯物主义的创立奠定基础；<br>②揭示了实践对认识的决定作用，为能动的反映论奠定基础；<br>③第一次揭示了社会生活的实践本质，为唯物史观奠定基础；<br>④为能动地认识世界和改造世界提供基本思想方法和工作方法。"}
]},
{title:"实践的本质与基本结构",qa:[
{q:"实践的基本特征与基本结构是什么？",a:"实践是人类能动地改造世界的社会性的物质活动。<br><strong>三个基本特征：</strong>客观实在性、自觉能动性、社会历史性。<br><strong>基本结构：</strong>实践的主体、客体和中介三者的有机统一。"},
{q:"什么是主体客体化与客体主体化？",a:"<strong>主体客体化：</strong>人通过实践使本质力量作用于客体，形成世界上本来不存在的对象物（人的体力和智力的物化）。<br><strong>客体主体化：</strong>客体从客观对象转化为主体生命结构或本质力量的因素。"},
{q:"实践的形式有哪些基本类型？",a:"①<strong>物质生产实践</strong>：最基本的实践活动，解决人与自然的矛盾；<br>②<strong>社会政治实践</strong>：处理各种政治关系的实践；<br>③<strong>科学文化实践</strong>：创造精神文化产品的实践活动。"},
{q:"实践对认识的决定作用是什么？",a:"①实践是认识的<strong>来源</strong>；②实践是认识发展的<strong>动力</strong>；③实践是认识的<strong>目的</strong>；④实践是检验认识真理性的<strong>唯一标准</strong>。"}
]},
{title:"认识的本质与过程",qa:[
{q:"什么是认识的本质？",a:"认识的本质是主体在实践基础上对客体的<strong>能动反映</strong>。两条根本对立的认识路线：唯物主义（从物到感觉和思想）VS唯心主义（从思想和感觉到物）。"},
{q:"什么是旧唯物主义认识论？其缺陷是什么？",a:"旧唯物主义认识论把人的认识看成消极被动地反映和接受外界对象（照镜子式反射），称为直观的、消极被动的反映论。<br><strong>缺陷：</strong>①离开实践考察认识，不了解实践对认识的决定作用；②不了解认识的辩证本性，把认识看成一次性完成的。"},
{q:"辩证唯物主义认识论的特点是什么？",a:"两个突出特点：①<strong>把实践的观点引入认识论</strong>，以实践观点阐述认识活动及规律；②<strong>把辩证法应用于反映论</strong>，揭示认识过程中多方面的辩证关系，把认识看成由不知到知、由浅入深的充满矛盾的能动过程。"},
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>感性认识和理性认识的关系？",a:"<strong>感性认识：</strong>感觉器官直接感受到的事物现象和外部联系（感觉、知觉、表象）。<br><strong>理性认识：</strong>借助抽象思维达到对事物本质和规律的认识（概念、判断、推理）。<br>关系：①理性认识依赖于感性认识；②感性认识有待于发展为理性认识；③二者相互渗透、相互包含。"},
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>感性认识上升到理性认识需要什么条件？",a:"①投身实践，深入调查，获取十分丰富和合乎实际的感性材料（基础）；<br>②经过思考，运用理论思维和科学抽象，进行去粗取精、去伪存真、由此及彼、由表及里的加工处理。"}
]},
{title:"真理的客观性、绝对性和相对性",qa:[
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>么是真理的客观性、绝对性和相对性？",a:"<strong>客观性：</strong>真理内容是对客观事物及其规律的正确反映，客观性是真理的本质属性。<br><strong>绝对性：</strong>任何真理都标志主观与客观相符合，包含不依赖于人的客观内容（承认真理客观性即承认绝对性）。<br><strong>相对性：</strong>对客观事物的正确认识总是有限度的、不完善的——认识有待扩展，认识有待深化。"},
{q:"真理的绝对性和相对性如何辩证统一？",a:"①二者相互依存，任何真理既是绝对的又是相对的；②二者相互包含——绝对之中有相对，相对之中有绝对；③人类认识是由相对性走向绝对性的不断深化过程，任何真理性认识都是这一转化过程中的一个环节。"},
{q:"真理与谬误的关系？",a:"二者相互对立——在确定对象和范围内，真理与谬误的对立是绝对的；<br>二者又相互转化——在一定条件下真理可变为谬误，谬误可变为真理。"}
]},
{title:"真理的检验标准",qa:[
{q:"为什么说实践是检验真理的唯一标准？",a:"①从<strong>真理的本性</strong>看：真理是主观与客观相符合，检验真理就是检验主客观是否符合；<br>②从<strong>实践的特点</strong>看：实践具有直接现实性，是它的客观实在性的具体表现。"},
{q:"实践标准的确定性与不确定性是什么？",a:"<strong>确定性（绝对性）：</strong>实践作为检验真理标准的唯一性、归根到底性、最终性。<br><strong>不确定性（相对性）：</strong>实践受到主客观条件制约，具有不能完全证实或驳倒一切认识的局限性；实践对真理的检验具有相对性、有限性。"}
]},
{title:"真理与价值的辩证统一",qa:[
{q:"什么是价值？价值具有哪些基本特性？",a:"价值是反映主体和客体之间意义关系的哲学范畴。<br><strong>四个基本特性：</strong>主体性、客观性、多维性、社会历史性。"},
{q:"什么是价值评价？",a:"价值评价揭示客体对于主体的意义，形成肯定或否定、喜欢或反感等态度。<br>特点：①以主客体之间的价值关系为认识对象；②结果与评价主体直接相关；③正确与否依赖于对客体状况和主体需要的认识；④有科学与非科学之别。"}
]},
{title:"认识世界和改造世界",qa:[
{q:"认识世界和改造世界的关系？",a:"二者相互依赖、相互制约的辩证统一。认识世界有助于改造世界（前提），改造世界实践中深化认识（深化）。决定了理论与实践必须相结合。"},
{q:"什么是自由？自由具备什么条件？",a:"自由是人在活动中通过认识和利用必然所表现出的自觉自主状态。<br><strong>认识条件：</strong>对客观事物运动发展规律性的正确认识，对必然的认识越全面深刻，自由程度越高。<br><strong>实践条件：</strong>能够将规律性认识运用于指导实践，实现改造世界的目的。"},
{q:"什么是守正和创新？",a:"<strong>守正：</strong>坚持实事求是，坚持真理性认识，坚持正确政治方向。<br><strong>创新：</strong>坚持解放思想，破除旧观念、旧模式、旧做法，发现和运用新联系、新属性、新规律。二者良性互动，相互促进、辩证统一。"}
]}
]},

{id:"ch3",title:"Ⅲ 人类社会及其发展规律",icon:"🏛️",sections:[
{title:"社会存在与社会意识",qa:[
{q:"唯心史观的主要缺陷是什么？",a:"至多考察了人的活动的思想动机，而没有进一步考究背后的物质动因和经济根源，把社会历史看成精神发展史，根本不懂得社会历史的客观规律和人民群众的决定作用。"},
{q:"什么是社会存在？",a:"社会存在是指社会物质生活条件，包括<strong>自然地理环境、人口因素和物质生产方式</strong>。<br>物质生产方式是生产力和生产关系的统一体，是社会历史发展的决定力量。"},
{q:"为什么说生产方式是社会历史发展的决定力量？",a:"①物质生产活动是人类社会赖以存在和发展的<strong>基础</strong>；②决定社会的<strong>结构、性质和面貌</strong>；③决定整个社会历史的<strong>变化发展</strong>和从低级向高级的更替。"},
{q:"社会存在和社会意识的辩证关系？社会意识的相对独立性？",a:"社会存在决定社会意识，社会意识反作用于社会存在。<br><strong>相对独立性：</strong>①与社会存在发展具有不完全同步性和不平衡性；②各种形式之间相互影响且具有历史继承性；③对社会存在具有能动的反作用（突出表现）。"}
]},
{title:"社会基本矛盾及其运动规律",qa:[
{q:"人类社会基本矛盾和基本规律是什么？",a:"<strong>基本矛盾：</strong>生产力与生产关系、经济基础与上层建筑之间的矛盾。<br><strong>基本规律：</strong>生产力与生产关系矛盾运动的规律、经济基础与上层建筑矛盾运动的规律。"},
{q:"什么是生产力？基本要素有哪些？",a:"生产力是人类在生产实践中形成的改造和影响自然的物质力量。<br>基本要素：①<strong>劳动资料</strong>（最重要的是生产工具）；②<strong>劳动对象</strong>；③<strong>劳动者</strong>。"},
{q:"生产力与生产关系的相互关系是什么？",a:"①<strong>生产力决定生产关系</strong>：生产力状况决定生产关系的性质，生产力发展决定生产关系的变化；<br>②<strong>生产关系反作用于生产力</strong>：适合时起推动作用，不适合时阻碍发展。"},
{q:"什么是经济基础与上层建筑？二者关系？",a:"<strong>经济基础：</strong>由生产力所决定的生产关系的总和（占支配地位的生产关系决定社会性质）。<br><strong>上层建筑：</strong>建立在经济基础之上的意识形态以及与之相适应的制度、组织和设施。<br>辩证统一：经济基础决定上层建筑，上层建筑反作用于经济基础。"}
]},
{title:"社会进步与社会形态更替",qa:[
{q:"什么是社会形态？如何理解历史选择性？",a:"社会形态是同生产力发展一定阶段相适应的经济基础与上层建筑的统一体。<br>历史选择性：①社会发展必然性为基础和可能性空间；②主观能动性与客观规律性相统一的过程；③归根结底是人民群众的选择性。"}
]},
{title:"社会历史发展的动力",qa:[
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>社会基本矛盾在历史发展中有哪些作用？",a:"①<strong>生产力</strong>是社会基本矛盾运动中最基本的动力因素，是最终决定力量；<br>②社会基本矛盾特别是生产力和生产关系的矛盾，<strong>决定其他矛盾</strong>的存在和发展；<br>③社会基本矛盾具有不同的表现形式和解决方式，<strong>根本影响和促进</strong>社会形态的变化和发展。"},
{q:"什么是阶级和阶级斗争？如何理解革命与改革？",a:"<strong>阶级：</strong>在社会经济结构中所处地位不同，一个集团能占有另一个集团的劳动。<br><strong>阶级斗争：</strong>归根结底围绕经济利益展开。<br><strong>革命：</strong>阶级斗争的最高形式，新制度代替旧制度。<br><strong>改革：</strong>社会制度的自我调整和完善，同一种社会形态中的量变和部分质变。"},
{q:"科技革命如何引起社会进步？",a:"①对<strong>生产方式</strong>产生深刻影响：改变生产力构成要素、劳动形式和经济结构；<br>②对<strong>生活方式</strong>产生巨大影响：带入信息时代，要求不断更新知识；<br>③促进<strong>思维方式</strong>的变革。"}
]},
{title:"人民群众在历史发展中的作用",qa:[
{q:"人民群众在创造历史中起了什么决定作用？",a:"人民群众是社会<strong>物质财富</strong>的创造者、<strong>精神财富</strong>的创造者、<strong>社会变革</strong>的决定力量。"},
{q:"马克思主义群众观点和群众路线是什么？",a:"<strong>群众观点：</strong>坚信人民群众自己解放自己、全心全意为人民服务、一切向人民负责、虚心向人民学习。<br><strong>群众路线：</strong>一切为了群众，一切依靠群众，从群众中来，到群众中去。是党的生命线和根本工作路线。"}
]}
]},

{id:"ch4",title:"Ⅳ 资本主义的本质及规律",icon:"⚙️",sections:[
{title:"商品经济和价值规律",qa:[
{q:"什么是商品经济？其产生条件是什么？",a:"商品经济是以交换为目的而进行生产的经济形式。<br>产生条件：①存在<strong>社会分工</strong>；②生产资料和劳动产品属于<strong>不同的所有者</strong>。"},
{q:"什么是商品的二因素和劳动的二重性？",a:"<strong>二因素：</strong>使用价值（自然属性）和价值（社会属性）。<br><strong>劳动二重性：</strong>具体劳动创造使用价值，抽象劳动形成价值。这是理解政治经济学的枢纽。"},
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>值规律的主要内容和作用是什么？",a:"商品价值量由<strong>社会必要劳动时间</strong>决定，按等价交换原则进行。<br>作用：①自发调节生产资料和劳动力在各部门的<strong>分配比例</strong>；②自发刺激社会<strong>生产力的发展</strong>；③自发调节社会<strong>收入的分配</strong>。"}
]},
{title:"资本主义经济制度",qa:[
{q:"什么是资本的原始积累？",a:"以暴力手段使生产者与生产资料相分离，资本迅速集中于少数人手中的历史过程。"},
{q:"劳动力成为商品要具备什么条件？",a:"①劳动者在法律上是<strong>自由人</strong>，能支配自己的劳动力；②劳动者<strong>没有任何生产资料</strong>，不得不出卖劳动力为生。"},
{q:"什么是可变资本和不变资本？",a:"<strong>不变资本：</strong>以生产资料形态存在的资本，价值通过具体劳动转移到新产品中。<br><strong>可变资本：</strong>购买劳动力的资本，价值由工人的劳动再生产出来。"},
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>余价值生产的基本方法是什么？",a:"①<strong>绝对剩余价值</strong>：必要劳动时间不变，延长工作日或提高劳动强度；<br>②<strong>相对剩余价值</strong>：工作日长度不变，缩短必要劳动时间，相对延长剩余劳动时间。"},
{q:"什么是资本积累？其历史趋势是什么？",a:"剩余价值的资本化就是<strong>资本积累</strong>。本质：资本家利用无偿占有的剩余价值扩大资本规模，进一步加强对工人的剥削和统治。<br><strong>历史趋势：</strong>生产社会化与资本主义私人占有之间的矛盾日益加剧，资本主义必然灭亡，社会主义必然胜利。"},
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>剩余价值理论的意义是什么？",a:"深刻揭露了资本主义生产关系的剥削本质，阐明了资产阶级与无产阶级之间阶级斗争的经济根源，指出了无产阶级革命的历史必然性。是马克思经济学说的核心内容和基石。"}
]},
{title:"资本主义的基本矛盾与经济危机",qa:[
{q:"<span style='display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:#dc2626;font-size:.75rem;font-weight:600;margin-right:4px'>&#127942; 真题</span>资本主义的基本矛盾和经济危机是什么？",a:"<strong>基本矛盾：</strong>生产社会化和生产资料资本主义私人占有之间的矛盾。<br><strong>经济危机：</strong>以生产过剩（相对过剩）为基本特征，具有周期性。大量商品积压，企业减产停工，金融机构倒闭。"}
]}
]},

{id:"ch5",title:"Ⅴ 资本主义的发展及其趋势",icon:"📈",sections:[
{title:"资本主义从自由竞争到垄断",qa:[
{q:"什么是垄断？为什么会产生垄断？",a:"垄断是少数资本主义大企业为获得高额利润，对一个或几个部门商品的生产、销售和价格进行操纵和控制。<br>原因：①生产集中发展到很高程度时少数企业联合；②企业规模巨大形成竞争限制；③激烈竞争使企业达成妥协、避免两败俱伤。"},
{q:"垄断为什么会使竞争更复杂和激烈？",a:"①垄断没有消除产生竞争的经济条件（私有制）；②垄断必须通过竞争来维持；③任何垄断组织不可能包揽全部社会生产，中小企业之间也存在竞争。"}
]},
{title:"垄断资本主义的发展",qa:[
{q:"什么是国家垄断资本主义？为什么产生？",a:"国家政权和私人垄断资本融合在一起的垄断资本主义。<br>原因：①社会生产力发展要求更大范围支配；②经济波动和危机的深化；③缓和社会矛盾、协调利益关系的需求。"},
{q:"垄断资本主义的基本特征是什么？",a:"①垄断组织在经济生活中起决定作用；②金融资本和金融寡头的统治；③资本输出有了特别重要的意义；④瓜分世界的国际垄断同盟形成；⑤最大资本主义大国把世界领土瓜分完毕。<br><strong>帝国主义实质：</strong>垄断资本凭借垄断地位，获取高额垄断利润。"}
]},
{title:"经济全球化及其影响",qa:[
{q:"经济全球化的表现和推动因素是什么？",a:"<strong>表现：</strong>生产全球化、贸易全球化、金融全球化。<br><strong>推动因素：</strong>①科学技术进步和生产力发展；②跨国公司的发展；③各国经济体制的变革和国际经济组织的发展。"},
{q:"经济全球化为什么是\"双刃剑\"？",a:"<strong>积极面：</strong>提供先进技术和管理经验、更多就业机会、推动国际贸易发展、促进跨国公司发展。<br><strong>消极面：</strong>发达国家与发展中国家地位和收益不平等；加剧资源短缺和环境污染；增加经济风险。"}
]},
{title:"当代资本主义新变化",qa:[
{q:"二战后资本主义变化的原因是什么？",a:"①科技革命和生产力发展（根本推动力量）；②工人阶级争取权利的斗争；③社会主义制度初步显示的优越性；④主张改良主义的政党的改革。"},

// ==================== APP STATE ====================
let state = {
  mode: 'browse',
  currentChapter: null,
  openSections: new Set(),
  openCards: new Set(),
  knownCards: JSON.parse(localStorage.getItem('m_known') || '{}'),
  flashcardIdx: 0,
  flashcardFlipped: false,
  flashcardFilter: 'all',
  flashcardPool: [],
  quizQuestions: [],
  quizIdx: 0,
  quizScore: 0,
  quizAnswered: false,
  dark: localStorage.getItem('m_dark') === 'true',
};

// ==================== INIT ====================
function init() {
  if (state.dark) document.body.classList.add('dark');
  buildNav();
  showWelcome();
  bindEvents();
}

function buildNav() {
  const nav = document.getElementById('nav');
  let html = '<div class="nav-group"><div class="nav-group-title">目录</div>';
  html += `<div class="nav-item" data-chapter="welcome"><span>🏠</span><span>首页</span></div>`;
  DATA.forEach(ch => {
    const total = ch.sections.reduce((s, sec) => s + sec.qa.length, 0);
    const known = ch.sections.reduce((s, sec) => s + sec.qa.filter(qa => state.knownCards[qa.q]==='known').length, 0);
    const done = known === total && total > 0;
    html += `<div class="nav-item" data-chapter="${ch.id}">
      <span class="progress-dot ${done ? 'done' : ''}"></span>
      <span>${ch.icon}</span>
      <span>${ch.title}</span>
      <span class="badge">${known}/${total}</span>
    </div>`;
  });
  html += '</div>';
  nav.innerHTML = html;
}

function bindEvents() {
  // Nav clicks
  document.getElementById('nav').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    const chId = item.dataset.chapter;
    if (chId === 'welcome') { showWelcome(); }
    else { state.currentChapter = DATA.find(c => c.id === chId); state.openSections = new Set(); state.openCards = new Set(); render(); }
    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  });

  // Menu button
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  });
  document.getElementById('overlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  });

  // Dark mode
  document.getElementById('darkBtn').addEventListener('click', () => {
    state.dark = !state.dark;
    document.body.classList.toggle('dark', state.dark);
    localStorage.setItem('m_dark', state.dark);
    document.getElementById('darkBtn').textContent = state.dark ? '☀️' : '🌙';
  });
  document.getElementById('darkBtn').textContent = state.dark ? '☀️' : '🌙';

  // Mode tabs
  document.getElementById('modeTabs').addEventListener('click', e => {
    const tab = e.target.closest('.mode-tab');
    if (!tab) return;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    if (!state.currentChapter) state.currentChapter = DATA[0];
    render();
  });

  // Search
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = e.target.value.trim();
      if (q.length >= 1) { showSearch(q); }
      else if (state.currentChapter) { render(); }
      else { showWelcome(); }
    }, 200);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (state.mode === 'flashcard') {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleFlashcard(); }
      if (e.key === 'ArrowRight' || e.key === 'l') { nextFlashcard(); }
      if (e.key === 'ArrowLeft' || e.key === 'h') { prevFlashcard(); }
      if (e.key === '1') { markFlashcard('known'); }
      if (e.key === '2') { markFlashcard('unknown'); }
    }
  });
}

// ==================== RENDER ====================
function render() {
  updateNavActive();
  if (!state.currentChapter) { showWelcome(); return; }
  switch (state.mode) {
    case 'browse': renderBrowse(); break;
    case 'flashcard': renderFlashcard(); break;
    case 'quiz': renderQuiz(); break;
    case 'stats': renderStats(); break;
  }
}

function updateNavActive() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active',
      (item.dataset.chapter === 'welcome' && !state.currentChapter) ||
      (state.currentChapter && item.dataset.chapter === state.currentChapter.id)
    );
  });
}

function showWelcome() {
  state.currentChapter = null;
  updateNavActive();
  const totalQA = DATA.reduce((s, ch) => s + ch.sections.reduce((ss, sec) => ss + sec.qa.length, 0), 0);
  const knownCount = Object.keys(state.knownCards).filter(k => state.knownCards[k] === 'known').length;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="welcome fade-in">
      <h2>马克思主义基本原理</h2>
      <p>期末复习互动指南 — 共 ${totalQA} 个知识点，已掌握 ${knownCount} 个</p>
      <div class="welcome-cards">
        <div class="welcome-card" onclick="startBrowse()">
          <div class="wc-icon">📖</div>
          <h3>浏览模式</h3>
          <p>按章节浏览所有知识点</p>
        </div>
        <div class="welcome-card" onclick="startFlashcard()">
          <div class="wc-icon">🃏</div>
          <h3>闪卡模式</h3>
          <p>翻转卡片测试记忆</p>
        </div>
        <div class="welcome-card" onclick="startQuiz()">
          <div class="wc-icon">📝</div>
          <h3>测验模式</h3>
          <p>选择题自测</p>
        </div>
        <div class="welcome-card" onclick="startStats()">
          <div class="wc-icon">📊</div>
          <h3>学习统计</h3>
          <p>查看复习进度</p>
        </div>
      </div>
      <div style="margin-top:32px; text-align:left; max-width:640px; margin-left:auto; margin-right:auto;">
        <h3 style="font-size:16px; margin-bottom:12px; color:var(--accent);">快速选择章节</h3>
        ${DATA.map(ch => {
          const total = ch.sections.reduce((s, sec) => s + sec.qa.length, 0);
          const known = ch.sections.reduce((s, sec) => s + sec.qa.filter(qa => state.knownCards[qa.q]==='known').length, 0);
          const pct = total ? Math.round(known/total*100) : 0;
          return `<div class="welcome-card" style="display:flex; align-items:center; gap:12px; margin-bottom:8px; cursor:pointer;" onclick="openChapter('${ch.id}')">
            <span style="font-size:24px;">${ch.icon}</span>
            <div style="flex:1;">
              <h3 style="font-size:14px;">${ch.title}</h3>
              <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
                <div style="flex:1; height:4px; background:var(--bg3); border-radius:2px; overflow:hidden;">
                  <div style="width:${pct}%; height:100%; background:${pct===100?'var(--success)':'var(--accent)'}; border-radius:2px;"></div>
                </div>
                <span style="font-size:11px; color:var(--text2);">${known}/${total}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function startBrowse() { state.mode='browse'; document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode==='browse')); if(!state.currentChapter) state.currentChapter=DATA[0]; render(); }
function startFlashcard() { state.mode='flashcard'; document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode==='flashcard')); if(!state.currentChapter) state.currentChapter=DATA[0]; render(); }
function startQuiz() { state.mode='quiz'; document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode==='quiz')); if(!state.currentChapter) state.currentChapter=DATA[0]; render(); }
function startStats() { state.mode='stats'; document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode==='stats')); if(!state.currentChapter) state.currentChapter=DATA[0]; render(); }
function openChapter(id) { state.currentChapter = DATA.find(c=>c.id===id); state.mode='browse'; document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode==='browse')); render(); }

// ==================== BROWSE MODE ====================
function renderBrowse() {
  const ch = state.currentChapter;
  const totalQA = ch.sections.reduce((s, sec) => s + sec.qa.length, 0);
  const knownCount = ch.sections.reduce((s, sec) => s + sec.qa.filter(qa => state.knownCards[qa.q]==='known').length, 0);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="fade-in">
      <h2 class="chapter-title">${ch.icon} ${ch.title}</h2>
      <p class="chapter-subtitle">共 ${totalQA} 个知识点 · 已掌握 ${knownCount} 个</p>
      <div class="stats-bar">
        <div class="stat-card"><div class="stat-num">${totalQA}</div><div class="stat-label">知识点总数</div></div>
        <div class="stat-card success"><div class="stat-num">${knownCount}</div><div class="stat-label">已掌握</div></div>
        <div class="stat-card warn"><div class="stat-num">${totalQA - knownCount}</div><div class="stat-label">待复习</div></div>
      </div>
      ${ch.sections.map((sec, si) => {
        const isOpen = state.openSections.has(si);
        const secKnown = sec.qa.filter(qa => state.knownCards[qa.q]==='known').length;
        return `<div class="section">
          <div class="section-header ${isOpen ? 'open' : ''}" data-section="${si}">
            <span class="arrow">▶</span>
            <h3>${sec.title}</h3>
            <span class="count">${secKnown}/${sec.qa.length}</span>
          </div>
          <div class="qa-list" style="${isOpen ? '' : 'display:none'}">
            ${sec.qa.map((qa, qi) => {
              const key = qa.q;
              const isOpenCard = state.openCards.has(key);
              const status = state.knownCards[key] || '';
              return `<div class="qa-card ${isOpenCard ? 'open' : ''} ${status}" data-key="${key}">
                <div class="qa-question" data-key="${key}">
                  <span class="q-icon">Q</span>
                  <span class="q-text">${qa.q}</span>
                  <span class="toggle-icon">▼</span>
                </div>
                <div class="qa-answer">
                  <div class="qa-answer-inner">${qa.a}</div>
                  <div class="qa-actions">
                    <button class="known-btn ${status==='known'?'active':''}" data-action="known" data-key="${key}">✓ 已掌握</button>
                    <button class="unknown-btn ${status==='unknown'?'active':''}" data-action="unknown" data-key="${key}">✗ 待复习</button>
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  // Bind section headers
  content.querySelectorAll('.section-header').forEach(el => {
    el.addEventListener('click', () => {
      const si = parseInt(el.dataset.section);
      if (state.openSections.has(si)) state.openSections.delete(si);
      else state.openSections.add(si);
      const list = el.nextElementSibling;
      list.style.display = list.style.display === 'none' ? '' : 'none';
      el.classList.toggle('open');
    });
  });

  // Bind QA cards
  content.querySelectorAll('.qa-question').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      if (state.openCards.has(key)) state.openCards.delete(key);
      else state.openCards.add(key);
      el.closest('.qa-card').classList.toggle('open');
    });
  });

  // Bind actions
  content.querySelectorAll('.qa-actions button').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const key = el.dataset.key;
      const action = el.dataset.action;
      if (state.knownCards[key] === action) { delete state.knownCards[key]; }
      else { state.knownCards[key] = action; }
      localStorage.setItem('m_known', JSON.stringify(state.knownCards));
      render();
      buildNav();
    });
  });
}

// ==================== FLASHCARD MODE ====================
function renderFlashcard() {
  const ch = state.currentChapter;
  const allCards = ch.sections.flatMap(sec => sec.qa);

  // Filter
  let pool = allCards;
  if (state.flashcardFilter === 'unknown') pool = allCards.filter(qa => state.knownCards[qa.q] !== 'known');
  else if (state.flashcardFilter === 'known') pool = allCards.filter(qa => state.knownCards[qa.q] === 'known');

  state.flashcardPool = pool;
  if (state.flashcardIdx >= pool.length) state.flashcardIdx = 0;

  const content = document.getElementById('content');
  if (pool.length === 0) {
    content.innerHTML = `<div class="flashcard-container fade-in"><div class="quiz-result"><h3>没有符合条件的卡片</h3><p style="color:var(--text2);margin:12px 0;">请尝试切换筛选条件</p></div></div>`;
    return;
  }

  const qa = pool[state.flashcardIdx];
  const status = state.knownCards[qa.q] || '';
  const pct = Math.round((state.flashcardIdx + 1) / pool.length * 100);

  content.innerHTML = `
    <div class="flashcard-container fade-in">
      <div class="flashcard-filter">
        <button class="${state.flashcardFilter==='all'?'active':''}" data-filter="all">全部 (${allCards.length})</button>
        <button class="${state.flashcardFilter==='unknown'?'active':''}" data-filter="unknown">待复习 (${allCards.filter(qa => state.knownCards[qa.q] !== 'known').length})</button>
        <button class="${state.flashcardFilter==='known'?'active':''}" data-filter="known">已掌握 (${allCards.filter(qa => state.knownCards[qa.q] === 'known').length})</button>
      </div>
      <div class="flashcard-progress">
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="count">${state.flashcardIdx + 1} / ${pool.length}</span>
      </div>
      <div class="flashcard ${state.flashcardFlipped ? 'flipped' : ''}" id="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="flashcard-label">问题</div>
            <div class="flashcard-text">${qa.q}</div>
            <div class="flashcard-hint">点击翻转 · 空格键 · Enter</div>
          </div>
          <div class="flashcard-back">
            <div class="flashcard-label">答案</div>
            <div class="flashcard-text">${qa.a}</div>
          </div>
        </div>
      </div>
      <div class="flashcard-nav">
        <button onclick="prevFlashcard()">◀ 上一个</button>
        <button class="success-btn" onclick="markFlashcard('known')">✓ 已掌握 <span class="kbd">1</span></button>
        <button class="warn-btn" onclick="markFlashcard('unknown')">✗ 待复习 <span class="kbd">2</span></button>
        <button class="primary" onclick="nextFlashcard()">下一个 ▶</button>
      </div>
      <div style="text-align:center;margin-top:12px;">
        <button class="btn btn-secondary" onclick="shuffleFlashcards()" style="font-size:13px;">🔀 随机打乱</button>
      </div>
    </div>`;

  document.getElementById('flashcard').addEventListener('click', toggleFlashcard);

  content.querySelectorAll('.flashcard-filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.flashcardFilter = btn.dataset.filter;
      state.flashcardIdx = 0;
      state.flashcardFlipped = false;
      renderFlashcard();
    });
  });
}

function toggleFlashcard() { state.flashcardFlipped = !state.flashcardFlipped; document.querySelector('.flashcard')?.classList.toggle('flipped'); }
function nextFlashcard() { state.flashcardIdx = (state.flashcardIdx + 1) % state.flashcardPool.length; state.flashcardFlipped = false; renderFlashcard(); }
function prevFlashcard() { state.flashcardIdx = (state.flashcardIdx - 1 + state.flashcardPool.length) % state.flashcardPool.length; state.flashcardFlipped = false; renderFlashcard(); }
function markFlashcard(type) {
  const qa = state.flashcardPool[state.flashcardIdx];
  if (state.knownCards[qa.q] === type) delete state.knownCards[qa.q];
  else state.knownCards[qa.q] = type;
  localStorage.setItem('m_known', JSON.stringify(state.knownCards));
  buildNav();
  nextFlashcard();
}
function shuffleFlashcards() {
  for (let i = state.flashcardPool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.flashcardPool[i], state.flashcardPool[j]] = [state.flashcardPool[j], state.flashcardPool[i]];
  }
  state.flashcardIdx = 0;
  state.flashcardFlipped = false;
  renderFlashcard();
}

// ==================== QUIZ MODE ====================
function renderQuiz() {
  const content = document.getElementById('content');
  if (state.quizQuestions.length === 0 || state.quizIdx >= state.quizQuestions.length) {
    if (state.quizQuestions.length > 0 && state.quizIdx >= state.quizQuestions.length) {
      // Show results
      const pct = Math.round(state.quizScore / state.quizQuestions.length * 100);
      content.innerHTML = `
        <div class="quiz-container fade-in">
          <div class="quiz-result">
            <div class="score">${pct}%</div>
            <div class="score-label">${state.quizScore} / ${state.quizQuestions.length} 题正确</div>
            <p style="color:var(--text2);margin-bottom:20px;">${pct >= 80 ? '优秀！掌握得很好！' : pct >= 60 ? '不错，继续加油！' : '需要再复习一下哦！'}</p>
            <button class="btn btn-primary" onclick="generateQuiz()">再来一轮</button>
            <button class="btn btn-secondary" style="margin-left:8px;" onclick="resetQuiz()">返回设置</button>
          </div>
        </div>`;
      return;
    }
    // Show setup
    const ch = state.currentChapter;
    content.innerHTML = `
      <div class="quiz-container fade-in">
        <div class="quiz-setup">
          <h3>📝 测验设置</h3>
          <p style="color:var(--text2);margin-bottom:16px;">章节：${ch.title}</p>
          <div class="quiz-option"><input type="radio" name="qnum" id="q5" value="5" checked><label for="q5">5 题</label></div>
          <div class="quiz-option"><input type="radio" name="qnum" id="q10" value="10"><label for="q10">10 题</label></div>
          <div class="quiz-option"><input type="radio" name="qnum" id="q20" value="20"><label for="q20">20 题</label></div>
          <div class="quiz-option"><input type="radio" name="qnum" id="qall" value="0"><label for="qall">全部题目</label></div>
          <button class="btn btn-primary" style="margin-top:16px;" onclick="generateQuiz()">开始测验</button>
        </div>
      </div>`;
    return;
  }

  // Show question
  const q = state.quizQuestions[state.quizIdx];
  const answered = state.quizAnswered;
  content.innerHTML = `
    <div class="quiz-container fade-in">
      <div class="flashcard-progress" style="margin-bottom:16px;">
        <div class="bar"><div class="bar-fill" style="width:${Math.round((state.quizIdx+1)/state.quizQuestions.length*100)}%"></div></div>
        <span class="count">${state.quizIdx + 1} / ${state.quizQuestions.length}</span>
      </div>
      <div class="quiz-question-card">
        <h4>第 ${state.quizIdx + 1} 题</h4>
        <div class="q">${q.question}</div>
        <div class="quiz-choices">
          ${q.choices.map((c, i) => {
            let cls = 'quiz-choice';
            if (answered) {
              if (i === q.correct) cls += ' correct';
              else if (i === q.selected) cls += ' wrong';
              cls += ' disabled';
            }
            return `<div class="${cls}" data-idx="${i}"><strong>${'ABCD'[i]}.</strong> ${c}</div>`;
          }).join('')}
        </div>
        ${answered ? `<div style="margin-top:16px;padding:12px;background:var(--accent-bg);border-radius:8px;font-size:13px;color:var(--text2);line-height:1.8;"><strong>解析：</strong>${q.explanation}</div>` : ''}
      </div>
      ${answered ? `<div style="text-align:center;margin-top:16px;"><button class="btn btn-primary" onclick="nextQuizQ()">下一题 ▶</button></div>` : ''}
    </div>`;

  if (!answered) {
    content.querySelectorAll('.quiz-choice').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        q.selected = idx;
        state.quizAnswered = true;
        if (idx === q.correct) state.quizScore++;
        renderQuiz();
      });
    });
  }
}

function generateQuiz() {
  const ch = state.currentChapter;
  const allQA = ch.sections.flatMap(sec => sec.qa);
  const nRadio = document.querySelector('input[name="qnum"]:checked');
  let count = nRadio ? parseInt(nRadio.value) : 5;
  if (count === 0 || count > allQA.length) count = allQA.length;

  // Shuffle and pick
  const shuffled = [...allQA].sort(() => Math.random() - 0.5).slice(0, count);

  // Generate questions
  state.quizQuestions = shuffled.map(qa => {
    // Pick wrong answers from other questions
    const others = allQA.filter(q => q.q !== qa.q).sort(() => Math.random() - 0.5).slice(0, 3);

    // Create a fill-in-the-blank question
    let question = qa.q;
    const answerText = qa.a.replace(/<[^>]*>/g, '').substring(0, 80);

    const correctAnswer = answerText.length > 60 ? answerText.substring(0, 60) + '...' : answerText;
    const wrongAnswers = others.map(o => {
      const t = o.a.replace(/<[^>]*>/g, '').substring(0, 60);
      return t.length > 60 ? t.substring(0, 60) + '...' : t;
    });

    const choices = [correctAnswer, ...wrongAnswers].sort(() => Math.random() - 0.5);
    const correctIdx = choices.indexOf(correctAnswer);

    return { question, choices, correct: correctIdx, selected: -1, explanation: qa.a.replace(/<[^>]*>/g, '').substring(0, 200) };
  });

  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  renderQuiz();
}

function nextQuizQ() {
  state.quizIdx++;
  state.quizAnswered = false;
  renderQuiz();
}

function resetQuiz() {
  state.quizQuestions = [];
  state.quizIdx = 0;
  state.quizScore = 0;
  renderQuiz();
}

// ==================== STATS MODE ====================
function renderStats() {
  const content = document.getElementById('content');
  const totalQA = DATA.reduce((s, ch) => s + ch.sections.reduce((ss, sec) => ss + sec.qa.length, 0), 0);
  const knownCount = Object.keys(state.knownCards).filter(k => state.knownCards[k] === 'known').length;
  const unknownCount = Object.keys(state.knownCards).filter(k => state.knownCards[k] === 'unknown').length;
  const pct = totalQA ? Math.round(knownCount / totalQA * 100) : 0;

  content.innerHTML = `
    <div class="fade-in">
      <h2 class="chapter-title">📊 学习统计</h2>
      <p class="chapter-subtitle">复习进度总览</p>
      <div class="stats-bar">
        <div class="stat-card"><div class="stat-num">${totalQA}</div><div class="stat-label">总知识点</div></div>
        <div class="stat-card success"><div class="stat-num">${knownCount}</div><div class="stat-label">已掌握</div></div>
        <div class="stat-card warn"><div class="stat-num">${unknownCount}</div><div class="stat-label">标记复习</div></div>
      </div>
      <div style="background:var(--bg2);border-radius:var(--radius);padding:20px;box-shadow:var(--card-shadow);margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:14px;font-weight:600;">总体掌握率</span>
          <span style="font-size:14px;color:var(--accent);font-weight:700;">${pct}%</span>
        </div>
        <div style="height:12px;background:var(--bg3);border-radius:6px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:6px;transition:width .5s ease;"></div>
        </div>
      </div>
      ${DATA.map(ch => {
        const total = ch.sections.reduce((s, sec) => s + sec.qa.length, 0);
        const known = ch.sections.reduce((s, sec) => s + sec.qa.filter(qa => state.knownCards[qa.q]==='known').length, 0);
        const pct = total ? Math.round(known/total*100) : 0;
        return `<div style="background:var(--bg2);border-radius:var(--radius);padding:16px;box-shadow:var(--card-shadow);margin-bottom:12px;cursor:pointer;" onclick="openChapter('${ch.id}')">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:14px;font-weight:600;">${ch.icon} ${ch.title}</span>
            <span style="font-size:13px;color:var(--accent);">${known}/${total} (${pct}%)</span>
          </div>
          <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:${pct===100?'var(--success)':'var(--accent)'};border-radius:4px;transition:width .5s ease;"></div>
          </div>
        </div>`;
      }).join('')}
      <div style="text-align:center;margin-top:20px;">
        <button class="btn btn-secondary" onclick="if(confirm('确定要重置所有学习进度吗？')){localStorage.removeItem('m_known');state.knownCards={};buildNav();renderStats();}">重置进度</button>
      </div>
    </div>`;
}

// ==================== SEARCH ====================
function showSearch(query) {
  const results = [];
  const q = query.toLowerCase();
  DATA.forEach(ch => {
    ch.sections.forEach(sec => {
      sec.qa.forEach(qa => {
        if (qa.q.toLowerCase().includes(q) || qa.a.toLowerCase().includes(q)) {
          results.push({ chapter: ch.title, icon: ch.icon, chId: ch.id, ...qa });
        }
      });
    });
  });

  const content = document.getElementById('content');
  if (results.length === 0) {
    content.innerHTML = `<div class="search-results fade-in"><p style="text-align:center;color:var(--text2);padding:40px;">未找到匹配的知识点</p></div>`;
    return;
  }

  const highlight = (text, q) => text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');

  content.innerHTML = `
    <div class="search-results fade-in">
      <p style="color:var(--text2);margin-bottom:16px;">找到 ${results.length} 个结果</p>
      ${results.map(r => `
        <div class="result-item" onclick="openChapter('${r.chId}')">
          <div class="result-chapter">${r.icon} ${r.chapter}</div>
          <div class="result-q">${highlight(r.q, query)}</div>
          <div class="result-a">${highlight(r.a.replace(/<[^>]*>/g,''), query)}</div>
        </div>
      `).join('')}
    </div>`;
}
