    <script>
      // Restore routes redirected by GitHub Pages' 404 fallback.
      ;(function (location) {
        if (location.search[1] !== '/') return
        const decoded = location.search
          .slice(1)
          .split('&')
          .map((part) => part.replace(/~and~/g, '&'))
          .join('?')
        window.history.replaceState(null, '', location.pathname.slice(0, -1) + decoded + location.hash)
      })(window.location)
    </script>
