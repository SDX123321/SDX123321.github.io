name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint check
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Link public/files to files/
        run: |
          rm -rf public/files
          ln -s ../files public/files

      - name: Build
        run: npm run build

      # SSH 密钥设置 — 写入前先确保换行符正确
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keygen -l -f ~/.ssh/id_rsa || {
            echo "密钥格式错误！"
            echo "请在 VPS 上重新生成 RSA 密钥再试："
            echo "  ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N \"\""
            echo "  cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys"
            echo "  cat ~/.ssh/id_rsa"
            exit 1
          }

          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      # 部署构建产物到 VPS
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          rsync -avz --delete --checksum \
            -e "ssh -p $VPS_PORT -i ~/.ssh/id_rsa" \
            dist/ \
            "$VPS_USER@$VPS_HOST:/var/www/site/"
