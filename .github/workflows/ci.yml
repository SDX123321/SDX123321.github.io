name: CI

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: exam_review
          POSTGRES_USER: exam_review
          POSTGRES_PASSWORD: exam_review_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U exam_review -d exam_review"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://exam_review:exam_review_ci@localhost:5432/exam_review
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rs
      - run: cargo fmt --manifest-path server-rs/Cargo.toml -- --check
      - run: cargo clippy --manifest-path server-rs/Cargo.toml --all-targets
      - run: cargo test --manifest-path server-rs/Cargo.toml --all-targets
      - run: cargo run --manifest-path server-rs/Cargo.toml --bin migrate
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov --manifest-path server-rs/Cargo.toml --all-features --lcov --output-path coverage/rust-lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage/rust-lcov.info

  contract-and-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate OpenAPI
        run: npx --yes @redocly/cli@1.34.5 lint server-rs/openapi.yaml
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: exam-review-api:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: exam-review-web:ci
