# nginx config for 期末复习网站 — Cloudflare 代理模式
# Cloudflare 自动处理 HTTPS，所以只监听 80 即可
# 但为了正确获取访客真实 IP，需要配置 Cloudflare 的 IP 范围

server {
    listen 80;
    server_name web.zzzzcx.com;
    root /var/www/site;

    # ---------- Cloudflare 真实 IP ----------
    # 来自 https://www.cloudflare.com/ips-v4/  和  https://www.cloudflare.com/ips-v6/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ---------- gzip ----------
    gzip on;
    gzip_types text/css application/javascript text/html application/json image/svg+xml text/plain application/pdf;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;

    access_log /var/log/nginx/site-access.log;
    error_log  /var/log/nginx/site-error.log;

    # ---------- 路由 ----------
    # SPA — 所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 构建产物（文件名带 hash，永久缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 学习文件
    location /files/ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }

    # 旧版 course 页面
    location /courses/ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Service Worker —— 禁止缓存
    location = /sw.js {
        add_header Cache-Control "no-cache";
        expires -1;
    }

    # ---------- 安全头 ----------
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
