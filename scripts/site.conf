# nginx config for 期末复习网站 — Cloudflare Full Strict 模式
#
# 配套：
#   1. Cloudflare Dashboard → SSL/TLS → Overview → 改为 "Full (Strict)"
#   2. Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
#      把证书贴到 /etc/nginx/certs/origin.pem、私钥贴到 origin.key
#   3. nginx -t && systemctl restart nginx

# ---------- HTTP -> HTTPS ----------
server {
    listen 80;
    server_name web.zzzzcx.com;
    # Cloudflare 也会做 HTTP->HTTPS，但这里加上双保险
    return 301 https://$host$request_uri;
}

# ---------- HTTPS 主站 ----------
server {
    listen 443 ssl http2;
    server_name web.zzzzcx.com;
    root /var/www/site;

    # ====== 原站证书（Cloudflare Origin Certificate） ======
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---------- Cloudflare 真实 IP ----------
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ---------- gzip ----------
    gzip on;
    gzip_types text/css application/javascript text/html application/json image/svg+xml text/plain;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    # 注意：不再 gzip PDF（已压缩，白费 CPU）

    access_log /var/log/nginx/site-access.log;
    error_log  /var/log/nginx/site-error.log;

    # ===========================================================
    # Content-Security-Policy（前期允许 unsafe-inline，逐步收紧）
    # ===========================================================
    # 放行来源：
    #   self           — 站点本身
    #   r2.zzzzcx.cn   — 图床/学习文件 CDN
    #   cdn.jsdelivr.net — KaTeX / MathJax / anime.js
    #   giscus.app     — 评论区（iframe）
    #   challenges.cloudflare.com — Turnstile 人机校验
    #   busuanzi.ibruce.info — 访问统计
    #   docs.google.com — PDF/PPTX 预览 iframe
    #
    # unsafe-inline 保留是因为：Vite 注入的 React 快速刷新、MathJax 内联配置
    # 后续可在 React 落地稳定后改成 nonce 或 hash 模式
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://giscus.app https://challenges.cloudflare.com https://busuanzi.ibruce.info; \
        style-src  'self' 'unsafe-inline' https://cdn.jsdelivr.net; \
        img-src    'self' data: https: blob:; \
        font-src   'self' data: https://cdn.jsdelivr.net; \
        connect-src 'self' https://r2.zzzzcx.cn; \
        frame-src  https://giscus.app https://docs.google.com https://challenges.cloudflare.com; \
        object-src 'none'; \
        base-uri   'self'; \
        form-action 'self'; \
        frame-ancestors 'self';" always;

    # ---------- HSTS只在 HTTPS响应里加 ----------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # 移除 X-XSS-Protection（现代浏览器已废弃，反而引入风险）

    # ---------- 路由 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # assets 已带 hash，安全头再声明一次保证生效
        add_header X-Content-Type-Options nosniff always;
    }

    location /files/ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }

    location /courses/ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Service Worker — 必须 no-cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # 关闭 favicon 404 噪音
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        try_files $uri =204;
    }
}
